# Performance optimization settings
font_family Maple Mono NF CN
# Font size
font_size 12.0

# Reduce rendering overhead
allow_remote_control yes
# Disable ligatures (ligatures can be slow)
disable_ligatures never

# Minimize sync overhead (reduces I/O)
sync_to_monitor no
# Disable cursor animations for lower CPU usage
cursor_stop_blinking_after 0

scrollback_lines 1000

# Disable unnecessary visual effects
draw_minimal_borders yes

# Performance-oriented update settings
text_composition_mode normal

# Input latency optimization
input_delay 0
# Disable mouse tracking acceleration
mouse_hide_wait 0

# Disable ligature features that add overhead
feature_ja_qq no

# Reduce shader usage
shader_recovery none
